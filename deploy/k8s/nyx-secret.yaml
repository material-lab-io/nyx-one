apiVersion: v1
kind: Secret
metadata:
  name: nyx-secrets
  namespace: bots
type: Opaque
stringData:
  # WhatsApp ACL - comma-separated phone numbers allowed in DM
  wa-dm-allowlist: "+917259620848,+919818452569"
  # WhatsApp group config (JSON) - groups where requireMention=false
  wa-groups: |
    {"120363423123267841@g.us":{"requireMention":false},"120363404614075738@g.us":{"requireMention":false}}
  # Mayor bridge endpoint (if running host-side mayor-bridge.js)
  mayor-bridge-url: "http://127.0.0.1:19000"
  mayor-bridge-token: "REPLACE_WITH_MAYOR_BRIDGE_TOKEN"
  # Linear API key — from https://linear.app/settings/api
  # Generate: Settings → API → Personal API keys → Create key
  linear-api-key: "REPLACE_WITH_LINEAR_API_KEY"
  # Linear team key — the short identifier for your team (e.g. FB, ENG)
  linear-team-key: "FB"
  # Groq API key for Whisper audio transcription (Voice/PTT messages)
  # Get from: https://console.groq.com/keys
  groq-api-key: "REPLACE_WITH_GROQ_API_KEY"
  # WhatsApp credentials (base64-encoded creds.json from charlie account)
  # Generate: cat ~/.nyx/creds/creds.json | base64 -w0
  whatsapp-creds-json: "REPLACE_WITH_BASE64_CREDS"
---
# Claude OAuth token — created via:
#   claude setup-token   # on operator's host
#   kubectl create secret generic nyx-claude-token -n bots \
#     --from-literal=oauth-token="sk-ant-oauthtoken01-..."
# Annual rotation:
#   kubectl create secret generic nyx-claude-token -n bots \
#     --from-literal=oauth-token="NEW_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
#   kubectl rollout restart deployment/nyx -n bots
