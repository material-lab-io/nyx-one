apiVersion: v1
kind: Secret
metadata:
  name: nyx-secrets
  namespace: bots
type: Opaque
stringData:
  # WhatsApp ACL - comma-separated phone numbers allowed in DM
  wa-dm-allowlist: "+917259620848,+919818452569"
  # WhatsApp group config (JSON) - groups where requireMention=false
  wa-groups: |
    {"120363423123267841@g.us":{"requireMention":false},"120363404614075738@g.us":{"requireMention":false}}
  # Mayor bridge endpoint (if running host-side mayor-bridge.js)
  mayor-bridge-url: "http://127.0.0.1:19000"
  mayor-bridge-token: "REPLACE_WITH_MAYOR_BRIDGE_TOKEN"
  # WhatsApp credentials (base64-encoded creds.json from charlie account)
  # Generate: cat ~/.nyx/creds/creds.json | base64 -w0
  whatsapp-creds-json: "REPLACE_WITH_BASE64_CREDS"
---
# Claude Code credentials secret
# Mount: kubectl create secret generic nyx-claude-creds --from-file=credentials.json=$HOME/.claude/credentials.json
# Or populate manually:
apiVersion: v1
kind: Secret
metadata:
  name: nyx-claude-creds
  namespace: bots
type: Opaque
data:
  # credentials.json: <base64-encoded contents of ~/.claude/credentials.json>
  # To generate: cat ~/.claude/credentials.json | base64 -w0
  credentials.json: "REPLACE_WITH_BASE64_CLAUDE_CREDENTIALS"
