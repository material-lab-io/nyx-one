apiVersion: v1
kind: Secret
metadata:
  name: princess-secrets
  namespace: bots
type: Opaque
stringData:
  # Bot OAuth token from Slack app settings (Install App → Bot User OAuth Token)
  slack-bot-token: "xoxb-REPLACE"
  # App-level token for Socket Mode (Settings → Basic Information → App-Level Tokens)
  slack-app-token: "xapp-REPLACE"
  # Slack user IDs allowed to DM princess (comma-separated U... IDs), or "*" for open
  bridge-slack-allowlist: "REPLACE"
  # Mayor bridge endpoint (host-side mayor-bridge.js)
  mayor-bridge-url: "http://127.0.0.1:19000"
  mayor-bridge-token: "REPLACE_WITH_MAYOR_BRIDGE_TOKEN"
---
# Claude OAuth token — created via:
#   claude setup-token   # on operator's host
#   kubectl create secret generic princess-claude-token -n bots \
#     --from-literal=oauth-token="sk-ant-oauthtoken01-..."
# Annual rotation:
#   kubectl create secret generic princess-claude-token -n bots \
#     --from-literal=oauth-token="NEW_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
#   kubectl rollout restart deployment/princess -n bots
