---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: princess-data-pvc
  namespace: bots
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: princess
  namespace: bots
  labels:
    app: princess
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: princess
  template:
    metadata:
      labels:
        app: princess
    spec:
      terminationGracePeriodSeconds: 35
      restartPolicy: Always
      containers:
        - name: princess
          image: princess-slack:latest
          env:
            - name: BRIDGE_TYPE
              value: slack
            - name: AGENT_NAME
              value: princess
            - name: BRIDGE_DATA_DIR
              value: /data/princess
            - name: BRIDGE_CLAUDE_WORKDIR
              value: /app
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: princess-claude-token
                  key: oauth-token
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: princess-secrets
                  key: slack-bot-token
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: princess-secrets
                  key: slack-app-token
            - name: BRIDGE_SLACK_ALLOWLIST
              valueFrom:
                secretKeyRef:
                  name: princess-secrets
                  key: bridge-slack-allowlist
                  optional: true
            - name: MAYOR_BRIDGE_URL
              valueFrom:
                secretKeyRef:
                  name: princess-secrets
                  key: mayor-bridge-url
                  optional: true
            - name: MAYOR_BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: princess-secrets
                  key: mayor-bridge-token
                  optional: true
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: princess-data
              mountPath: /data/princess
      volumes:
        - name: princess-data
          persistentVolumeClaim:
            claimName: princess-data-pvc
