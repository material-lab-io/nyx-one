# ⚠️ WARNING: this manifest is INCOMPLETE relative to the running deployment.
# The live pod additionally mounts five configMaps via subPath
#   (nyx-bridge-code, nyx-to-linear-code, nyx-store-code, nyx-files-code, nyx-claude-md)
# and uses memory.limits=2Gi. Those were applied imperatively and are NOT captured here.
# `kubectl apply -f nyx.yaml` will silently DELETE those mounts and break the running pod
# (dropbox helpers, CLAUDE.md, bridge code, nyx-to-linear all vanish).
#
# To safely apply (or to bring up a fresh cluster):
#   see deploy/k8s/README.md → "Imperative deploy state (apply after nyx.yaml)".
# Capturing the live state back into this manifest is a tracked follow-up there.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nyx-data-pvc
  namespace: bots
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyx
  namespace: bots
  labels:
    app: nyx
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required: ReadWriteOnce PVC can only be mounted by one pod
  selector:
    matchLabels:
      app: nyx
  template:
    metadata:
      labels:
        app: nyx
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 320
      restartPolicy: Always
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: nyx
          image: nyx-claude:latest
          imagePullPolicy: Never
          env:
            - name: BRIDGE_TYPE
              value: baileys
            - name: AGENT_NAME
              value: nyx
            - name: BRIDGE_DATA_DIR
              value: /data/nyx
            - name: BRIDGE_CLAUDE_WORKDIR
              value: /app
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nyx-claude-token
                  key: oauth-token
            - name: NYX_WA_DM_ALLOWLIST
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: wa-dm-allowlist
                  optional: true
            - name: NYX_WA_GROUP_POLICY
              value: "open"
            - name: NYX_WA_GROUPS
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: wa-groups
                  optional: true
            - name: MAYOR_BRIDGE_URL
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: mayor-bridge-url
                  optional: true
            - name: MAYOR_BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: mayor-bridge-token
                  optional: true
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: groq-api-key
                  optional: true
            - name: WHATSAPP_CREDS_JSON
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: whatsapp-creds-json
                  optional: true
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: linear-api-key
                  optional: true
            - name: LINEAR_TEAM_KEY
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: linear-team-key
                  optional: true
            - name: INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: ingest-token
                  optional: true
            - name: NYX_OWNER_JID
              valueFrom:
                secretKeyRef:
                  name: nyx-secrets
                  key: nyx-owner-jid
                  optional: true
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: nyx-data
              mountPath: /data/nyx
      volumes:
        - name: nyx-data
          persistentVolumeClaim:
            claimName: nyx-data-pvc
